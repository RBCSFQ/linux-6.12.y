name: Compile W132D Kernel + DTB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu flex bison bc

      - name: Fix Kconfig line endings (CRLF → LF)
        run: |
          sed -i 's/\r$//' drivers/net/wireless/unisoc/Kconfig

      - name: Kernel build
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make defconfig
          make -j$(nproc) Image dtbs DTBS=rk3528-w132d.dtb

      - name: Show artifacts
        run: |
          echo "=== Kernel Image ==="
          ls -la arch/arm64/boot/Image*
          echo ""
          echo "=== DTB ==="
          ls -la arch/arm64/boot/dts/rockchip/rk3528-w132d.dtb
          echo ""
          echo "=== Check UWE5621 built-in symbols ==="
          grep -c 'sprd\|uwe5621\|unisoc\|wcn_boot\|sprdwl' System.map || echo "(no UWE5621 symbols found in System.map)"
          echo ""
          echo "=== Check UWE5621 config ==="
          grep -E 'SPARD_WLAN|UWE5621|SPRDWL|WCN_SDIO|TTY_OVERY' .config || echo "(UWE5621 config not found)"

      - name: Upload DTB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rk3528-w132d-dtb
          path: arch/arm64/boot/dts/rockchip/rk3528-w132d.dtb

      - name: Upload Kernel Image artifact
        uses: actions/upload-artifact@v4
        with:
          name: rk3528-w132d-kernel
          path: |
            arch/arm64/boot/Image
            arch/arm64/boot/Image.gz
